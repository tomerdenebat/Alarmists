<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Zestibular</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    }
    .status-bar {
      width: 100%; max-width: 390px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 0;
      font-size: 12px; color: #444; font-weight: 500;
    }
    .container {
      width: 100%; max-width: 390px; flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 28px 32px; gap: 0;
    }
    .app-name {
      font-size: 12px; font-weight: 500; color: #333;
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 16px;
    }
    .bt-btn {
      width: 100%; padding: 12px;
      border-radius: 12px; border: 0.5px solid #1e1e1e;
      background: #111; color: #555;
      font-size: 13px; font-weight: 500; cursor: pointer;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .bt-btn.connected { border-color: #22c55e; color: #22c55e; background: #060f0a; }
    .bt-btn.connecting { border-color: #f59e0b; color: #f59e0b; background: #130e00; }
    .bt-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .bt-dot.on { background: #22c55e; }
    .bt-dot.blink { background: #f59e0b; animation: pulse 0.6s infinite; }
    .clock-ring {
      width: 190px; height: 190px; border-radius: 50%;
      border: 1.5px solid #1e1e1e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; cursor: pointer; margin-bottom: 8px;
    }
    .clock-ring::before {
      content: ''; position: absolute; inset: 10px;
      border-radius: 50%; border: 0.5px solid #161616;
    }
    .time-display {
      font-size: 40px; font-weight: 200; color: #fff;
      letter-spacing: -2px; font-family: monospace; line-height: 1; z-index: 1;
    }
    .time-input-hidden {
      position: absolute; opacity: 0; width: 100%; height: 100%;
      border-radius: 50%; cursor: pointer; top: 0; left: 0;
    }
    .tap-hint {
      font-size: 9px; color: #2a2a2a;
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 8px; z-index: 1;
    }
    .alarm-label {
      font-size: 12px; color: #2e2e2e; letter-spacing: 0.04em;
      margin-bottom: 20px; margin-top: 6px; height: 18px;
    }
    .alarm-label span { color: #5b9cf6; font-weight: 500; }
    .intensity-row {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: #111; border: 0.5px solid #1e1e1e;
      border-radius: 16px; padding: 14px 20px; margin-bottom: 12px;
    }
    .intensity-label {
      font-size: 12px; color: #444; letter-spacing: 0.04em;
      text-transform: uppercase; font-weight: 500;
    }
    .intensity-controls { display: flex; align-items: center; gap: 16px; }
    .int-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0.5px solid #2a2a2a; background: #1a1a1a; color: #888;
      font-size: 20px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; line-height: 1; transition: background 0.1s;
    }
    .int-btn:active { background: #252525; transform: scale(0.94); }
    .int-value {
      font-size: 20px; font-weight: 300; color: #fff;
      min-width: 20px; text-align: center; font-family: monospace;
    }
    .btn-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; margin-bottom: 12px;
    }
    .btn {
      padding: 17px; border-radius: 16px; border: none;
      font-size: 15px; font-weight: 500; cursor: pointer;
      letter-spacing: 0.02em; transition: opacity 0.12s, transform 0.1s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .btn:active { opacity: 0.65; transform: scale(0.96); }
    .btn-clock  { background: #141414; color: #555; border: 0.5px solid #1e1e1e; }
    .btn-test   { background: #141414; color: #555; border: 0.5px solid #1e1e1e; }
    .btn-set    { background: #5b9cf6; color: #fff; }
    .btn-set.armed { background: #1d4ed8; }
    .btn-cancel { background: #141414; color: #3a3a3a; border: 0.5px solid #1a1a1a; }
    .feedback {
      width: 100%; border-radius: 14px; padding: 13px 16px;
      font-size: 12px; font-weight: 500; text-align: center;
      color: #333; background: #0f0f0f; border: 0.5px solid #181818;
      letter-spacing: 0.02em; min-height: 44px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all 0.25s;
    }
    .fb-armed  { color: #5b9cf6; border-color: #1e3a6e; background: #0d1f3c; }
    .fb-cancel { color: #ef4444; border-color: #3b1010; background: #150505; }
    .fb-test   { color: #f59e0b; border-color: #3b2800; background: #130e00; }
    .fb-ok     { color: #22c55e; border-color: #0f3320; background: #060f0a; }
    .fb-error  { color: #ef4444; border-color: #3b1010; background: #150505; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .pulsing { animation: pulse 0.8s infinite; }
    .home-bar { width: 100%; max-width: 390px; display: flex; justify-content: center; padding-top: 16px; }
    .home-bar-inner { width: 120px; height: 4px; background: #1e1e1e; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="status-bar">
    <span id="live-time">9:41</span>
    <span style="letter-spacing:0.1em; font-size:10px;">ZESTIBULAR</span>
    <span id="bt-status-text" style="color:#333;">BT</span>
  </div>

  <div class="container">
    <div class="app-name">Zestibular</div>

    <button class="bt-btn" id="bt-btn" onclick="toggleBluetooth()">
      <div class="bt-dot" id="bt-dot"></div>
      <span id="bt-label">Connect to Zestibular</span>
    </button>

    <div class="clock-ring" onclick="openClock()">
      <div class="time-display" id="time-show">07:00</div>
      <input type="time" class="time-input-hidden" id="alarm-input" value="07:00" oninput="updateTime(this.value)" />
      <div class="tap-hint">tap to set</div>
    </div>

    <div class="alarm-label" id="alarm-label">alarm not set</div>

    <div class="intensity-row">
      <div class="intensity-label">Intensity</div>
      <div class="intensity-controls">
        <div class="int-btn" onclick="changeIntensity(-1)">−</div>
        <div class="int-value" id="int-val">3</div>
        <div class="int-btn" onclick="changeIntensity(1)">+</div>
      </div>
    </div>

    <div class="btn-grid">
      <button class="btn btn-clock"  onclick="openClock()">Clock</button>
      <button class="btn btn-test"   onclick="testCircuit()">Test</button>
      <button class="btn btn-set"    id="btn-set" onclick="setAlarm()">Set</button>
      <button class="btn btn-cancel" onclick="cancelAlarm()">Cancel</button>
    </div>

    <div class="feedback" id="feedback">
      <div class="status-dot" id="fb-dot" style="background:#222"></div>
      <span id="fb-text">Connect to ESP32 to begin</span>
    </div>
  </div>

  <div class="home-bar"><div class="home-bar-inner"></div></div>

  <script>
    const SERVICE_UUID      = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_RX           = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_TX           = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    let bleDevice = null;
    let rxChar = null;
    let btConnected = false;
    let armed = false;
    let intensity = 3;

    function updateClock() {
      const n = new Date();
      let h = n.getHours() % 12 || 12;
      let m = String(n.getMinutes()).padStart(2, '0');
      const el = document.getElementById('live-time');
      if (el) el.textContent = h + ':' + m;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function toggleBluetooth() {
      if (btConnected) { disconnect(); return; }
      await connect();
    }

    async function connect() {
      if (!navigator.bluetooth) {
        setFeedback('fb-error', '#ef4444', false, 'Use Chrome browser for Bluetooth');
        return;
      }
      try {
        setBtUI('connecting');
        setFeedback('fb-test', '#f59e0b', true, 'Scanning for Zestibular...');

        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'Zestibular' }],
          optionalServices: [SERVICE_UUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        const server  = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        rxChar = await service.getCharacteristic(CHAR_RX);

        const txChar = await service.getCharacteristic(CHAR_TX);
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', onESP32Message);

        btConnected = true;
        setBtUI('connected');
        setFeedback('fb-ok', '#22c55e', false, 'Connected to Zestibular');

      } catch (err) {
        setBtUI('disconnected');
        if (err.name === 'NotFoundError') {
          setFeedback('fb-error', '#ef4444', false, 'No device found — is ESP32 powered on?');
        } else {
          setFeedback('fb-error', '#ef4444', false, 'Connection failed: ' + err.message);
        }
      }
    }

    function disconnect() {
      if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
    }

    function onDisconnected() {
      btConnected = false; rxChar = null;
      setBtUI('disconnected');
      setFeedback('fb-cancel', '#ef4444', false, 'Disconnected from ESP32');
    }

    function onESP32Message(event) {
      const value = new TextDecoder().decode(event.target.value);
      if (value === 'ACK')        setFeedback('fb-armed', '#5b9cf6', false, 'Alarm confirmed by ESP32');
      else if (value === 'FIRING')     setFeedback('fb-test',   '#f59e0b', true,  'ESP32 firing test pulse...');
      else if (value === 'PWM ON')     setFeedback('fb-ok',     '#22c55e', false, 'Circuit ON');
      else if (value === 'PWM OFF')    setFeedback('fb-cancel',  '#ef4444', false, 'Circuit OFF');
      else if (value === 'CANCELLED')  setFeedback('fb-cancel',  '#ef4444', false, 'Alarm cancelled');
      else                             setFeedback('fb-ok',     '#22c55e', false, 'ESP32: ' + value);
    }

    async function sendCommand(cmd) {
      if (!btConnected || !rxChar) {
        setFeedback('fb-error', '#ef4444', false, 'Not connected — tap Connect first');
        return false;
      }
      try {
        await rxChar.writeValue(new TextEncoder().encode(cmd));
        return true;
      } catch (err) {
        setFeedback('fb-error', '#ef4444', false, 'Send failed: ' + err.message);
        return false;
      }
    }

    function setBtUI(state) {
      const btn   = document.getElementById('bt-btn');
      const dot   = document.getElementById('bt-dot');
      const label = document.getElementById('bt-label');
      const text  = document.getElementById('bt-status-text');
      if (state === 'connected') {
        btn.className = 'bt-btn connected';
        dot.className = 'bt-dot on';
        label.textContent = 'Connected — tap to disconnect';
        text.style.color = '#22c55e';
      } else if (state === 'connecting') {
        btn.className = 'bt-btn connecting';
        dot.className = 'bt-dot blink';
        label.textContent = 'Connecting...';
        text.style.color = '#f59e0b';
      } else {
        btn.className = 'bt-btn';
        dot.className = 'bt-dot';
        label.textContent = 'Connect to Zestibular';
        text.style.color = '#333';
      }
    }

    function setFeedback(cls, dotColor, pulse, text) {
      const fb = document.getElementById('feedback');
      fb.className = 'feedback ' + cls;
      const d = document.getElementById('fb-dot');
      d.style.background = dotColor;
      d.className = pulse ? 'status-dot pulsing' : 'status-dot';
      document.getElementById('fb-text').textContent = text;
    }

    function openClock() { document.getElementById('alarm-input').click(); }

    function updateTime(val) {
      if (!val) return;
      const [h, m] = val.split(':');
      const ampm = parseInt(h) >= 12 ? 'PM' : 'AM';
      const h12  = parseInt(h) % 12 || 12;
      document.getElementById('time-show').textContent = h12 + ':' + m;
      document.getElementById('alarm-label').innerHTML = 'wake at <span>' + h12 + ':' + m + ' ' + ampm + '</span>';
      armed = false;
      document.getElementById('btn-set').className = 'btn btn-set';
      setFeedback('', '#222', false, 'Ready');
    }

    function changeIntensity(dir) {
      intensity = Math.min(5, Math.max(1, intensity + dir));
      document.getElementById('int-val').textContent = intensity;
    }

    async function setAlarm() {
      const val = document.getElementById('alarm-input').value;
      if (!val) { setFeedback('fb-cancel', '#ef4444', false, 'Set a time first'); return; }
      const [h, m] = val.split(':');
      const ampm = parseInt(h) >= 12 ? 'PM' : 'AM';
      const h12  = parseInt(h) % 12 || 12;
      const ok = await sendCommand('SET ' + val + ' ' + intensity);
      if (ok) {
        armed = true;
        document.getElementById('btn-set').className = 'btn btn-set armed';
        setFeedback('fb-armed', '#5b9cf6', false, 'Alarm set — ' + h12 + ':' + m + ' ' + ampm + '  |  intensity ' + intensity);
      }
    }

    async function testCircuit() {
      setFeedback('fb-test', '#f59e0b', true, 'Sending test pulse...');
      const ok = await sendCommand('ON');
      if (ok) {
        setTimeout(async () => {
          await sendCommand('OFF');
          setFeedback('fb-ok', '#22c55e', false, 'Test complete — circuit OK');
        }, 3000);
      }
    }

    async function cancelAlarm() {
      if (!armed) { setFeedback('', '#222', false, 'No alarm to cancel'); return; }
      const ok = await sendCommand('CANCEL');
      if (ok) {
        armed = false;
        document.getElementById('btn-set').className = 'btn btn-set';
        document.getElementById('alarm-label').textContent = 'alarm not set';
        setFeedback('fb-cancel', '#ef4444', false, 'Alarm cancelled');
      }
    }
  </script>
</body>
</html>
